# Serves dist/ in the deploy image (see Dockerfile). Coolify terminates TLS
# in front of this; the container just speaks plain HTTP on port 80.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # build.sh ships .gz twins of the wasm/js; serve those to browsers that
    # accept gzip (everyone) without compressing per request.
    gzip_static on;

    location / {
        try_files $uri $uri/ =404;
        # Filenames aren't content-hashed: make browsers revalidate so a
        # redeploy isn't masked by a stale cached wasm.
        add_header Cache-Control "no-cache";
    }
}
