# Browser (wasm) builds only — native builds never read this section.
# getrandom (rand's entropy source) refuses to guess on wasm32-unknown-unknown
# and requires this cfg to select the browser-crypto backend; the matching
# `wasm_js` cargo feature is enabled in Cargo.toml.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
